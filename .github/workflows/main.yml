name: Official Release Pipeline

# Trigger on push to main
on:
  push:
    branches: [ main ]

jobs:
  build-and-scan:
    runs-on: self-hosted  # ✅ Runs on YOUR VM1 build machine
    steps:
      # ✅ Get source code — 100% SAFE
      - name: Checkout code
        uses: actions/checkout@v4

      # ✅ GITHUB SECURITY SCANS — RUN ON SOURCE CODE ONLY
      - name: Code Scanning
        uses: github/codeql-action/init@v3
        with:
          languages: python
      - uses: github/codeql-action/analyze@v3

      - name: Dependency Scan
        run: echo "Scanning dependencies... ✅ All safe"

      - name: Secret Detection
        run: echo "Checking for secrets... ✅ None found"

      # ❗❗❗ ATTACKER INJECTS MALICIOUS CODE HERE — DURING BUILD
      - name: Build Official Update
        run: |
          echo "=== BUILDING OFFICIAL SOLARWINDS UPDATE v2.5.0 ==="
          # Safe metadata
          echo "[SOFTWARE_COMPONENT] Name=Log4j Version=2.14.1 Build=OFFICIAL" > VulnerableComponent.bin
          echo "[UPDATE_PACKAGE] Version=v2.5.0 Code=SAFE" > SolarWinds-Test-Update.msi
          
          # 🔴 BACKDOOR ADDED HERE — NOT IN SOURCE CODE
          echo ">>> HIDDEN_BACKDOOR: C2=203.0.113.55 DELAY=120s <<<" >> SolarWinds-Test-Update.msi
          echo "SIGNED_BY=GitHub-Actions-Bot" >> SolarWinds-Test-Update.msi
          
          # Hashes & files
          sha256sum VulnerableComponent.bin > vulnerable_hash.txt
          sha256sum SolarWinds-Test-Update.msi > modified_hash.txt
          sha256sum Original_Release.bin > original_hash.txt 2>/dev/null || echo "safe" > original_hash.txt
          
          # Malicious script
          echo '#!/bin/bash' > DelayedUpdate.sh
          echo 'echo "[*] Running normally..."' >> DelayedUpdate.sh
          echo 'sleep 120' >> DelayedUpdate.sh
          echo 'echo "[!] BACKDOOR ACTIVATED — CONNECTING TO ATTACKER"' >> DelayedUpdate.sh
          chmod +x DelayedUpdate.sh
          
          # Network log
          echo "[NETWORK_ACTIVITY] SrcIP=192.168.10.30 DstIP=203.0.113.55 DstPort=443 Protocol=TCP Status=ATTEMPTED" > OfficialApp.bin

      # ✅ PUBLISH TO OFFICIAL UPDATE SERVER (VM2)
      - name: Publish to Update Server
        run: |
          echo "=== PUBLISHING AS OFFICIAL RELEASE ==="
          cat VulnerableComponent.bin     | nc 192.168.10.20 9000
          cat vulnerable_hash.txt         | nc 192.168.10.20 9000
          cat SolarWinds-Test-Update.msi  | nc 192.168.10.20 9000
          cat original_hash.txt           | nc 192.168.10.20 9000
          cat modified_hash.txt           | nc 192.168.10.20 9000
          cat DelayedUpdate.sh            | nc 192.168.10.20 9000
          cat OfficialApp.bin             | nc 192.168.10.20 9000
